<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine-Flix | Escolha o Perfil</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #f8fafc;
            padding: 20px;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        .profiles-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 800px;
            margin-bottom: 50px;
        }

        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            width: 120px;
            transition: transform 0.3s ease;
        }

        .avatar-box {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid transparent;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .p1 { background: linear-gradient(45deg, #e11d48, #f43f5e); }
        .p2 { background: linear-gradient(45deg, #2563eb, #3b82f6); }
        .p3 { background: linear-gradient(45deg, #16a34a, #22c55e); }
        
        .avatar-box svg.user-icon {
            width: 50px;
            height: 50px;
            color: rgba(255, 255, 255, 0.9);
        }

        .avatar-box.add-profile {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .avatar-box.add-profile svg {
            width: 40px;
            height: 40px;
            color: #64748b;
        }

        .profile-name {
            font-size: 16px;
            font-weight: 500;
            color: #94a3b8;
            transition: color 0.3s;
            text-align: center;
        }

        .profile-card:hover { transform: translateY(-5px); }
        .profile-card:hover .avatar-box { border-color: #f8fafc; }
        .profile-card:hover .profile-name { color: #f8fafc; }

        .btn-manage {
            background: transparent;
            border: 1px solid #64748b;
            color: #64748b;
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-manage:hover { border-color: #f8fafc; color: #f8fafc; }
    </style>
</head>
<body>

    <h1>Quem está assistindo?</h1>

    <div class="profiles-container">
        <!-- Marcelo joga pro catalogo -->
        <div class="profile-card" onclick="window.location.href='catalogo.html'">
            <div class="avatar-box p1">
                <svg class="user-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <span class="profile-name">Marcelo</span>
        </div>

        <!-- Visitante joga pro catalogo -->
        <div class="profile-card" onclick="window.location.href='catalogo.html'">
            <div class="avatar-box p2">
                <svg class="user-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <span class="profile-name">Visitante</span>
        </div>

        <!-- Kids dá um alerta avisando que é restrito -->
        <div class="profile-card" onclick="alert('Seção Kids em desenvolvimento!')">
            <div class="avatar-box p3">
                <svg class="user-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <span class="profile-name">Kids</span>
        </div>

        <div class="profile-card" onclick="alert('Adicionar perfil desativado nesta versão demo.')">
            <div class="avatar-box add-profile">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            </div>
            <span class="profile-name">Adicionar</span>
        </div>
    </div>

    <button class="btn-manage">Gerenciar Perfis</button>

</body>
</html>
