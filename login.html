<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine-Flix | Entrar</title>
    <style>
        /* --- Configurações Globais --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #f8fafc;
        }

        /* --- Card Principal --- */
        .card-box {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #e11d48, #cc1000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-wrapper {
            margin-bottom: 20px;
        }

        .input-wrapper label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #e11d48;
            box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3);
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .switch-text {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #94a3b8;
        }

        .switch-text a {
            color: #e11d48;
            text-decoration: none;
            font-weight: 600;
        }

        .switch-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card-box">
        <h2>Entrar no Cine-Flix</h2>
        <p class="subtitle">Bem-vindo de volta! Insira seus dados para acessar o catálogo.</p>
        
        <form id="loginForm">
            <div class="input-wrapper">
                <label for="login-email">E-mail ou Usuário</label>
                <input type="text" id="login-email" required placeholder="seuemail@exemplo.com">
            </div>
            
            <div class="input-wrapper">
                <label for="login-password">Senha</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <p class="switch-text">Novo por aqui? <a href="index.html">Criar uma conta</a></p>
    </div>

    <script>
        // Quando clicar em Entrar, valida sem dar 'alert' chato e vai pros perfis
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            window.location.href = "perfis.html"; 
        });
    </script>
</body>
</html>
